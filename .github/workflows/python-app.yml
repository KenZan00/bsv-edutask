name: Backend Unit Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      # Install same version of Python as project uses , 3.10
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      # Install dependancies, our backend is in backend folder. 
      run: |
        cd backend 
        python -m pip install --upgrade pip
        pip install -r requirements.pip
